<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CREWHOLIC — Forgot Password | Fusion-Powered Digital Agency</title>
    <!-- Bootstrap 5 CSS + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .forgot-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: rgba(155, 81, 224, 0.5);
            box-shadow: 0 30px 60px -12px rgba(155, 81, 224, 0.3);
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
            overflow: hidden;
            position: relative;
        }

        .brand-logo {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(155, 81, 224, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(155, 81, 224, 0);
            }
        }

        h2 {
            background: linear-gradient(135deg, #FFFFFF, #D0D5FF, #9B51E0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #9B51E0;
            box-shadow: 0 0 0 3px rgba(155, 81, 224, 0.2);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        .form-control-with-icon {
            padding-left: 45px;
        }

        .btn-grad {
            background: linear-gradient(95deg, #9B51E0 0%, #F2994A 100%);
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            width: 100%;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(155, 81, 224, 0.4);
            color: white;
        }

        .btn-outline-grad {
            background: transparent;
            border: 2px solid #9B51E0;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-outline-grad:hover {
            background: rgba(155, 81, 224, 0.2);
            border-color: #F2994A;
            transform: translateY(-2px);
        }

        .switch-link {
            color: #F2994A;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-link:hover {
            color: #9B51E0;
            text-decoration: underline;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 19, 30, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 14px;
            border: 1px solid rgba(155, 81, 224, 0.7);
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155, 81, 224, 0.3);
            border-top-color: #9B51E0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .otp-input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 30px 0;
        }

        .otp-input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            border-color: #9B51E0;
            box-shadow: 0 0 0 3px rgba(155, 81, 224, 0.2);
            outline: none;
        }

        .timer-text {
            font-size: 14px;
            color: #F2994A;
            margin-top: 15px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #9B51E0;
        }

        @media (max-width: 768px) {
            .glass-card {
                margin: 20px;
                padding: 30px 20px !important;
            }
            .otp-input {
                width: 45px;
                height: 55px;
                font-size: 20px;
            }
            .otp-input-group {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="forgot-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <div class="brand-icon">
                            <img id="brandLogo" class="brand-logo" src="skr.png" alt="CREWHOLIC Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%239B51E0\'/%3E%3Ctext x=\'50\' y=\'68\' text-anchor=\'middle\' font-size=\'28\' fill=\'white\' font-weight=\'bold\'%3EC%3C/text%3E%3C/svg%3E'">
                        </div>
                        <h2 class="mb-2 mt-3">Forgot Password?</h2>
                        <p class="text-white-50">Don't worry, we'll help you reset it</p>
                    </div>

                    <!-- Step 1: Email Input -->
                    <div id="stepEmail">
                        <form id="forgotForm">
                            <div class="form-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" class="form-control form-control-with-icon" id="resetEmail" placeholder="Enter your email address" required>
                            </div>
                            <button type="submit" class="btn-grad">Send OTP <i class="fas fa-paper-plane ms-2"></i></button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-white-50 mb-0">
                                <a href="login.html" class="switch-link"><i class="fas fa-arrow-left me-2"></i>Back to Login</a>
                            </p>
                        </div>
                    </div>

                    <!-- Step 2: OTP Verification -->
                    <div id="stepOtp" style="display: none;">
                        <p class="text-white-50 text-center mb-3">Enter the 6-digit code sent to <strong id="displayEmail"></strong></p>
                        <div class="otp-input-group">
                            <input type="text" class="otp-input" maxlength="1" id="otp1" autofocus>
                            <input type="text" class="otp-input" maxlength="1" id="otp2">
                            <input type="text" class="otp-input" maxlength="1" id="otp3">
                            <input type="text" class="otp-input" maxlength="1" id="otp4">
                            <input type="text" class="otp-input" maxlength="1" id="otp5">
                            <input type="text" class="otp-input" maxlength="1" id="otp6">
                        </div>
                        <button id="verifyOtpBtn" class="btn-grad">Verify OTP <i class="fas fa-check-circle ms-2"></i></button>
                        <div class="text-center mt-3">
                            <p class="text-white-50 small">Didn't receive code? 
                                <a href="#" id="resendOtpBtn" class="switch-link">Resend</a>
                            </p>
                            <p id="timerText" class="timer-text"></p>
                        </div>
                    </div>

                    <!-- Step 3: Reset Password -->
                    <div id="stepReset" style="display: none;">
                        <form id="resetPasswordForm">
                            <div class="form-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" class="form-control form-control-with-icon" id="newPassword" placeholder="New Password" required>
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', event)"></i>
                            </div>
                            <div class="form-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" class="form-control form-control-with-icon" id="confirmPassword" placeholder="Confirm New Password" required>
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', event)"></i>
                            </div>
                            <button type="submit" class="btn-grad">Reset Password <i class="fas fa-key ms-2"></i></button>
                        </form>
                    </div>

                    <div id="loadingSpinner" class="loading">
                        <div class="spinner"></div>
                        <p class="text-white-50 mt-2">Processing...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ONLY SCRIPT PART UPDATED (rest of your UI stays SAME) -->
<script>
const API_URL = "https://crewholic.onrender.com/api";
let resetEmail = '';
let timerInterval = null;
let timeLeft = 60;

// Toast
function showMessage(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.textContent = message;

    if (isError) {
        toast.style.background = '#8B2C2C';
    }

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// Loading
function setLoading(show) {
    document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
}

// SEND OTP API
async function sendOTPByEmail(email) {
    try {
        const res = await fetch("http://localhost:5000/api/send-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.msg);
        }

        return true;

    } catch (err) {
        showMessage(err.message || "Failed to send OTP", true);
        return false;
    }
}

// TIMER
function startTimer() {
    const timerText = document.getElementById('timerText');
    timeLeft = 60;

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerText.innerHTML = 'OTP expired. <a href="#" id="resendExpiredBtn" class="switch-link">Resend</a>';
            document.getElementById('resendExpiredBtn').onclick = resendOTP;
        } else {
            timerText.innerHTML = `Code expires in: 0:${timeLeft.toString().padStart(2, '0')}`;
            timeLeft--;
        }
    }, 1000);
}

// OTP INPUT HANDLING
function initOtpInputs() {
    const inputs = document.querySelectorAll('.otp-input');

    inputs.forEach((input, i) => {
        input.addEventListener('input', () => {
            if (input.value && i < inputs.length - 1) {
                inputs[i + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) {
                inputs[i - 1].focus();
            }
        });
    });
}

function getOtpValue() {
    return [...document.querySelectorAll('.otp-input')]
        .map(i => i.value)
        .join('');
}

function clearOtpInputs() {
    document.querySelectorAll('.otp-input').forEach(i => i.value = '');
}

// =====================
// STEP 1: SEND OTP
// =====================
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('resetEmail').value.trim();

    if (!email) {
        showMessage('Enter email', true);
        return;
    }

    setLoading(true);

    resetEmail = email;

    const sent = await sendOTPByEmail(email);

    setLoading(false);

    if (!sent) return;

    showMessage("OTP sent!");

    document.getElementById('stepEmail').style.display = 'none';
    document.getElementById('stepOtp').style.display = 'block';
    document.getElementById('displayEmail').innerText = email;

    initOtpInputs();
    startTimer();
});

// =====================
// STEP 2: VERIFY OTP
// =====================
document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
    const otp = getOtpValue();

    if (otp.length !== 6) {
        showMessage('Enter full OTP', true);
        return;
    }

    setLoading(true);

    try {
        const res = await fetch("http://localhost:5000/api/verify-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: resetEmail,
                otp: otp
            })
        });

        const data = await res.json();

        setLoading(false);

        if (res.ok) {
            showMessage("OTP verified!");

            document.getElementById('stepOtp').style.display = 'none';
            document.getElementById('stepReset').style.display = 'block';

            clearInterval(timerInterval);

        } else {
            showMessage(data.msg || "Invalid OTP", true);
            clearOtpInputs();
        }

    } catch (err) {
        setLoading(false);
        showMessage("Server error", true);
    }
});

// =====================
// RESEND OTP
// =====================
async function resendOTP(e) {
    if (e) e.preventDefault();

    if (!resetEmail) return;

    setLoading(true);

    const sent = await sendOTPByEmail(resetEmail);

    setLoading(false);

    if (!sent) return;

    showMessage("OTP resent!");
    clearOtpInputs();
    startTimer();
}

document.getElementById('resendOtpBtn').addEventListener('click', resendOTP);

// =====================
// RESET PASSWORD
// =====================
document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        showMessage("Passwords don't match", true);
        return;
    }

    setLoading(true);

    try {
        const res = await fetch("http://localhost:5000/api/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: resetEmail,
                password: newPassword
            })
        });

        const data = await res.json();

        setLoading(false);

        if (res.ok) {
            showMessage("Password reset successful!");
            setTimeout(() => window.location.href = "login.html", 1500);
        } else {
            showMessage(data.msg, true);
        }

    } catch (err) {
        setLoading(false);
        showMessage("Server error", true);
    }
});
</script>
</body>
</html>
