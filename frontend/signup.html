<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CREWHOLIC — Sign Up | Join the Fusion-Powered Crew</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .signup-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.4s ease;
            padding: 48px 44px;
            width: 100%;
            max-width: 540px;
        }

        .glass-card:hover {
            border-color: rgba(155, 81, 224, 0.5);
            box-shadow: 0 30px 60px -12px rgba(155, 81, 224, 0.3);
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
            overflow: hidden;
        }

        .brand-logo {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(155, 81, 224, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(155, 81, 224, 0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .signup-header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #B0BBFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .signup-header p {
            color: #9AA2C5;
            font-size: 15px;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #9B51E0;
            box-shadow: 0 0 0 3px rgba(155, 81, 224, 0.2);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-grad {
            background: linear-gradient(95deg, #9B51E0 0%, #F2994A 100%);
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            width: 100%;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(155, 81, 224, 0.4);
            color: white;
        }

        .switch-link {
            color: #F2994A;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-link:hover {
            color: #9B51E0;
            text-decoration: underline;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #C5CBF0;
        }

        .input-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .input-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .terms-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 28px;
        }
        
        .terms-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #9B51E0;
        }
        
        .terms-group label {
            font-size: 13px;
            color: #B4BDE8;
            cursor: pointer;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #8F99CC;
            margin-top: 24px;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 19, 30, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 14px;
            border: 1px solid rgba(155, 81, 224, 0.7);
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155, 81, 224, 0.3);
            border-top-color: #9B51E0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .success-card {
            background: linear-gradient(135deg, rgba(155, 81, 224, 0.2), rgba(242, 153, 74, 0.2));
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: scaleIn 0.5s ease;
        }
        
        .success-card i {
            font-size: 80px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .success-card h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .success-card p {
            color: #B4BDE8;
            margin-bottom: 30px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .glass-card {
                margin: 20px;
                padding: 32px 24px !important;
            }
            .input-row {
                flex-direction: column;
                gap: 20px;
            }
            .success-card {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="signup-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <div class="text-center mb-4">
                        <div class="brand-icon">
                            <img id="brandLogo" class="brand-logo" src="skr.png" alt="CREWHOLIC Logo">
                        </div>
                        <div class="signup-header">
                            <h1><i class="fas fa-user-plus"></i> Join the Crew</h1>
                            <p>Start your fusion-powered journey with CREWHOLIC</p>
                        </div>
                    </div>

                    <form id="signupForm">
                        <div class="input-row">
                            <div class="input-group">
                                <label>First Name</label>
                                <input type="text" id="firstName" class="form-control" placeholder="Alex" required>
                            </div>
                            <div class="input-group">
                                <label>Last Name</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Rivera" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="signupEmail" class="form-control" placeholder="hello@crewholic.com" required>
                        </div>
                        <div class="input-group">
                            <label>Phone Number (Optional)</label>
                            <input type="tel" id="phoneNumber" class="form-control" placeholder="+1 234 567 8900">
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>Password</label>
                                <input type="password" id="signupPassword" class="form-control" placeholder="Create a strong password" required>
                            </div>
                            <div class="input-group">
                                <label>Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                            </div>
                        </div>
                        <div class="terms-group">
                            <input type="checkbox" id="termsCheckbox" required>
                            <label for="termsCheckbox">I agree to the <a href="#" class="switch-link">Terms of Service</a> and <a href="#" class="switch-link">Privacy Policy</a></label>
                        </div>
                        <button type="submit" class="btn-grad"><i class="fas fa-rocket"></i> Sign Up & Get Started</button>
                    </form>
                    
                    <div class="login-link">
                        Already have an account? <a href="login.html" class="switch-link">Sign In →</a>
                    </div>

                    <div id="loadingSpinner" class="loading">
                        <div class="spinner"></div>
                        <p class="text-white-50 mt-2">Creating account...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://crewholic.onrender.com/api";

function showSuccessAndRedirect(message, userName, redirectUrl) {
    const overlay = document.createElement('div');
    overlay.className = 'success-overlay';
    overlay.innerHTML = `
        <div class="success-card">
            <i class="fas fa-check-circle"></i>
            <h2>${message}</h2>
            <p>Welcome, ${userName}! Redirecting you to CREWHOLIC...</p>
            <div class="spinner" style="width: 40px; height: 40px; border: 3px solid rgba(155,81,224,0.3); border-top-color: #9B51E0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;"></div>
        </div>
    `;
    
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        window.location.href = redirectUrl;
    }, 2000);
}

function showMessage(message, isError = false) {
    const existingToast = document.querySelector('.toast-message');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.textContent = message;
    
    if (isError) {
        toast.style.background = '#8B2C2C';
        toast.style.borderColor = '#FF6B6B';
    } else {
        toast.style.background = 'rgba(17, 19, 30, 0.95)';
    }
    
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function setLoading(show) {
    const spinner = document.getElementById('loadingSpinner');
    const form = document.getElementById('signupForm');
    
    if (show) {
        spinner.style.display = 'block';
        form.style.opacity = '0.5';
        form.style.pointerEvents = 'none';
    } else {
        spinner.style.display = 'none';
        form.style.opacity = '1';
        form.style.pointerEvents = 'auto';
    }
}

function createParticles() {
    const particlesContainer = document.getElementById('particles');
    const particleCount = 50;
    
    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 5 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${Math.random() * 10 + 5}s`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        
        particlesContainer.appendChild(particle);
    }
}

// Handle Signup
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const name = firstName + " " + lastName;
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const termsAccepted = document.getElementById('termsCheckbox').checked;
    
    if (!firstName || !lastName) {
        showMessage('Please enter your full name', true);
        return;
    }
    
    if (password !== confirmPassword) {
        showMessage('Passwords do not match', true);
        return;
    }
    
    if (password.length < 6) {
        showMessage('Password must be at least 6 characters', true);
        return;
    }
    
    if (!termsAccepted) {
        showMessage('Please accept the Terms of Service', true);
        return;
    }
    
    setLoading(true);
    
try {
    const response = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, password })
    });

    const data = await response.json();

    if (response.ok) {
        localStorage.setItem('user', JSON.stringify(data.user));

        showSuccessAndRedirect(
            "Account Created Successfully!",
            name,
            "home.html"
        );
    } else {
        showMessage(data.msg || "Signup failed", true);
        setLoading(false);
    }

} catch (error) {
    console.error(error);
    showMessage("Server error. Please try again.", true);
    setLoading(false);
}
});

window.addEventListener('load', () => {
    createParticles();
    // NO AUTO REDIRECT - User stays on signup page
});
</script>
</body>
</html>
