<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>CREWHOLIC — Sign Up</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: white;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.1;
            }

            90% {
                opacity: 0.1;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .signup-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 45px;
            width: 100%;
            max-width: 550px;
            transition: 0.3s;
        }

        .glass-card:hover {
            border-color: rgba(155, 81, 224, 0.5);
            box-shadow: 0 20px 60px rgba(155, 81, 224, 0.25);
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto auto 20px;
            overflow: hidden;
        }

        .brand-logo {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .signup-header h1 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .signup-header p {
            color: #B4BDE8;
        }

        .form-control {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 16px;
            padding: 14px 16px;
        }

        .form-control:focus {
            background: rgba(0,0,0,0.55);
            color: white;
            border-color: #9B51E0;
            box-shadow: 0 0 0 4px rgba(155,81,224,0.2);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-group-custom {
            margin-bottom: 20px;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #C5CBF0;
        }

        .btn-grad {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 60px;
            background: linear-gradient(95deg, #9B51E0, #F2994A);
            color: white;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(155,81,224,0.4);
        }

        .switch-link {
            color: #F2994A;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link:hover {
            color: #9B51E0;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #AAB3DD;
        }

        .terms-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 25px;
        }

        .terms-group label {
            font-size: 13px;
            color: #B4BDE8;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 9999;
            color: white;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #9B51E0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media(max-width:768px) {
            .glass-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="signup-container">
    <div class="glass-card">

        <div class="brand-icon">
            <img src="skr.png" class="brand-logo" alt="Logo">
        </div>

        <div class="signup-header">
            <h1>
                <i class="fas fa-user-plus"></i>
                Join the Crew
            </h1>

            <p>Start your fusion-powered journey</p>
        </div>

        <form id="signupForm">

            <div class="row">
                <div class="col-md-6">
                    <div class="input-group-custom">
                        <label>First Name</label>
                        <input
                            type="text"
                            id="firstName"
                            class="form-control"
                            placeholder="Alex"
                            autocomplete="given-name"
                            required
                        />
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group-custom">
                        <label>Last Name</label>
                        <input
                            type="text"
                            id="lastName"
                            class="form-control"
                            placeholder="Rivera"
                            autocomplete="family-name"
                            required
                        />
                    </div>
                </div>
            </div>

            <div class="input-group-custom">
                <label>Email</label>

                <input
                    type="email"
                    id="signupEmail"
                    class="form-control"
                    placeholder="hello@crewholic.com"
                    autocomplete="email"
                    required
                />
            </div>

            <div class="input-group-custom">
                <label>Phone Number</label>

                <input
                    type="tel"
                    id="phoneNumber"
                    class="form-control"
                    placeholder="+91 9876543210"
                    autocomplete="tel"
                />
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="input-group-custom">
                        <label>Password</label>

                        <input
                            type="password"
                            id="signupPassword"
                            class="form-control"
                            placeholder="Strong password"
                            autocomplete="new-password"
                            required
                        />
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group-custom">
                        <label>Confirm Password</label>

                        <input
                            type="password"
                            id="confirmPassword"
                            class="form-control"
                            placeholder="Confirm password"
                            autocomplete="new-password"
                            required
                        />
                    </div>
                </div>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="termsCheckbox" required />

                <label for="termsCheckbox">
                    I agree to the
                    <a href="#" class="switch-link">Terms</a>
                    &
                    <a href="#" class="switch-link">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-grad">
                <i class="fas fa-rocket"></i>
                Sign Up
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html" class="switch-link">Sign In</a>
        </div>

        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
            <p class="mt-3 text-light">Creating account...</p>
        </div>

    </div>
</div>

<script>
    const API_URL = "https://crewholic-2.onrender.com/api/register";;

    function showMessage(message, isError = false) {

        const oldToast = document.querySelector('.toast-message');

        if (oldToast) oldToast.remove();

        const toast = document.createElement('div');

        toast.className = 'toast-message';

        toast.textContent = message;

        toast.style.background = isError
            ? '#8B2C2C'
            : '#1B5E20';

        toast.style.border = isError
            ? '1px solid #FF6B6B'
            : '1px solid #4CAF50';

        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 3000);
    }

    function setLoading(show) {

        const spinner = document.getElementById('loadingSpinner');

        const form = document.getElementById('signupForm');

        if (show) {
            spinner.style.display = 'block';
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';
        } else {
            spinner.style.display = 'none';
            form.style.opacity = '1';
            form.style.pointerEvents = 'auto';
        }
    }

    function createParticles() {

        const particlesContainer = document.getElementById('particles');

        for (let i = 0; i < 50; i++) {

            const particle = document.createElement('div');

            particle.classList.add('particle');

            const size = Math.random() * 5 + 2;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            particle.style.left = `${Math.random() * 100}%`;

            particle.style.animationDuration =
                `${Math.random() * 10 + 5}s`;

            particle.style.animationDelay =
                `${Math.random() * 5}s`;

            particlesContainer.appendChild(particle);
        }
    }

    document.getElementById('signupForm')
        .addEventListener('submit', async (e) => {

        e.preventDefault();

        const firstName =
            document.getElementById('firstName').value.trim();

        const lastName =
            document.getElementById('lastName').value.trim();

        const email =
            document.getElementById('signupEmail').value.trim();

        const phone =
            document.getElementById('phoneNumber').value.trim();

        const password =
            document.getElementById('signupPassword').value;

        const confirmPassword =
            document.getElementById('confirmPassword').value;

        const termsAccepted =
            document.getElementById('termsCheckbox').checked;

        const name = `${firstName} ${lastName}`;

        if (!firstName || !lastName) {
            return showMessage(
                'Please enter full name',
                true
            );
        }

        if (password !== confirmPassword) {
            return showMessage(
                'Passwords do not match',
                true
            );
        }

        const strongPassword =
            /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        if (!strongPassword.test(password)) {

            return showMessage(
                'Password must contain uppercase, lowercase, number and 8+ chars',
                true
            );
        }

        if (!termsAccepted) {
            return showMessage(
                'Please accept Terms',
                true
            );
        }

        setLoading(true);

        try {

            console.log("Sending request...");

            const response = await fetch(API_URL, {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    name,
                    email,
                    password,
                    phone
                })
            });

            console.log("STATUS:", response.status);

            const text = await response.text();

            console.log("RAW RESPONSE:", text);

            let data = {};

            try {
                data = JSON.parse(text);
            } catch {
                data = { msg: text };
            }

            if (response.ok) {

                localStorage.setItem(
                    'user',
                    JSON.stringify(data.user || {})
                );

                showMessage(
                    'Account created successfully!'
                );

                setTimeout(() => {
                    window.location.replace('home.html');
                }, 1200);

            } else {

                showMessage(
                    data.msg || 'Signup failed',
                    true
                );

                setLoading(false);
            }

        } catch (error) {

            console.error("FULL ERROR:", error);

            showMessage(
                error.message || 'Server error',
                true
            );

            setLoading(false);
        }
    });

    window.addEventListener('load', createParticles);
</script>

</body>
</html>
