<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>CREWHOLIC — Login Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.1;
            }

            90% {
                opacity: 0.1;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            width: 100%;
            max-width: 500px;
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .brand-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            margin: auto;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            color: white;
            font-weight: 800;
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            padding: 14px 14px 14px 45px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            box-shadow: none;
            border-color: #9B51E0;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-grad {
            width: 100%;
            border: none;
            border-radius: 60px;
            padding: 14px;
            background: linear-gradient(95deg, #9B51E0 0%, #F2994A 100%);
            color: white;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
        }

        .switch-link {
            color: #F2994A;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link:hover {
            color: #9B51E0;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 25px;
            border-radius: 50px;
            background: rgba(20, 20, 20, 0.95);
            color: white;
            z-index: 99999;
            border: 1px solid #9B51E0;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        .success-card {
            background: rgba(15, 18, 40, 0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 400px;
        }

        .success-card i {
            color: #4CAF50;
            font-size: 70px;
            margin-bottom: 20px;
        }

        .divider {
            border-color: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-link a {
            color: #F2994A;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link a:hover {
            color: #9B51E0;
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>

    <div class="login-container">

        <div class="glass-card">

            <div class="text-center mb-4">

                <div class="brand-icon">
                    <img src="skr.png" class="brand-logo">
                </div>

                <h2>CREWHOLIC</h2>

                <p class="sub-text">
                    Fusion-Powered Digital Agency
                </p>

            </div>

            <!-- LOGIN FORM -->

            <form id="loginForm">

                <div class="form-group">

                    <i class="fas fa-envelope input-icon"></i>

                    <input type="email"
                        id="loginEmail"
                        class="form-control"
                        placeholder="Email Address">

                </div>

                <div class="form-group">

                    <i class="fas fa-lock input-icon"></i>

                    <input type="password"
                        id="loginPassword"
                        class="form-control"
                        placeholder="Password">

                    <i class="fas fa-eye password-toggle"
                        onclick="togglePassword('loginPassword', this)">
                    </i>

                </div>

                <div class="forgot-link">
                    <a href="forgotpassword.html">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn-grad">
                    Sign In
                </button>

            </form>

            <hr class="divider">

            <!-- OTP LOGIN -->

            <h5 class="text-center text-white mb-4">
                Login With Mobile OTP
            </h5>

            <div class="form-group">

                <i class="fas fa-phone input-icon"></i>

                <input type="text"
                    id="phoneNumber"
                    class="form-control"
                    placeholder="+91XXXXXXXXXX">

            </div>

            <button class="btn-grad mb-3"
                onclick="sendOTP()">

                Send OTP

            </button>

            <div class="form-group">

                <i class="fas fa-key input-icon"></i>

                <input type="text"
                    id="otpCode"
                    class="form-control"
                    placeholder="Enter OTP">

            </div>

            <button class="btn-grad"
                onclick="verifyOTP()">

                Verify OTP

            </button>

            <!-- RECAPTCHA -->

            <div id="recaptcha-container"></div>

            <div class="text-center mt-4">

                <p class="sub-text">
                    Don't have an account?

                    <a href="signup.html"
                        class="switch-link">

                        Sign Up

                    </a>
                </p>

            </div>

        </div>

    </div>

    <!-- FIREBASE -->

    <script type="module">

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getAuth,
            RecaptchaVerifier,
            signInWithPhoneNumber
        }

        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {
            getAnalytics
        }

        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";


        /* ================= FIREBASE CONFIG ================= */

        const firebaseConfig = {

            apiKey: "AIzaSyCM4_0PHoK_oFlt-JhgOd94ggLEMcjsyyc",

            authDomain: "crewholic-93783.firebaseapp.com",

            projectId: "crewholic-93783",

            storageBucket: "crewholic-93783.firebasestorage.app",

            messagingSenderId: "924137749707",

            appId: "1:924137749707:web:7f76c13805afb7aa5c6f4e",

            measurementId: "G-N1CSWMG0CD"
        };


        /* ================= INITIALIZE FIREBASE ================= */

        const app = initializeApp(firebaseConfig);

        getAnalytics(app);

        const auth = getAuth(app);


        /* ================= RECAPTCHA ================= */

        window.recaptchaVerifier =
            new RecaptchaVerifier(
                auth,
                'recaptcha-container',
                {
                    size: 'invisible'
                }
            );


        /* ================= SEND OTP ================= */

        window.sendOTP = async function () {

            const phoneNumber =
                document.getElementById('phoneNumber').value.trim();

            if (!phoneNumber) {

                showMessage("Enter phone number", true);
                return;
            }

            try {

                const confirmationResult =
                    await signInWithPhoneNumber(
                        auth,
                        phoneNumber,
                        window.recaptchaVerifier
                    );

                window.confirmationResult =
                    confirmationResult;

                showMessage("OTP Sent Successfully ✅");

            }

            catch (error) {

                console.log(error);

                showMessage(error.message, true);
            }
        };


        /* ================= VERIFY OTP ================= */

        window.verifyOTP = async function () {

            const code =
                document.getElementById('otpCode').value.trim();

            if (!code) {

                showMessage("Enter OTP", true);
                return;
            }

            try {

                const result =
                    await window.confirmationResult.confirm(code);

                const user = result.user;

                showSuccessAndRedirect(
                    "📱 Mobile Login Successful!",
                    user.phoneNumber,
                    "home.html"
                );

            }

            catch (error) {

                console.log(error);

                showMessage("Invalid OTP ❌", true);
            }
        };

    </script>


    <!-- MAIN SCRIPT -->

    <script>

        const API_URL = "https://crewholic-2.onrender.com/api/login";

        function showMessage(message, isError = false) {

            const existing =
                document.querySelector('.toast-message');

            if (existing) existing.remove();

            const toast =
                document.createElement('div');

            toast.className = 'toast-message';

            toast.innerText = message;

            if (isError) {

                toast.style.background = "#8B2C2C";
            }

            document.body.appendChild(toast);

            setTimeout(() => {

                toast.remove();

            }, 3000);
        }


        function togglePassword(id, icon) {

            const input =
                document.getElementById(id);

            if (input.type === "password") {

                input.type = "text";

                icon.classList.replace(
                    "fa-eye",
                    "fa-eye-slash"
                );

            }

            else {

                input.type = "password";

                icon.classList.replace(
                    "fa-eye-slash",
                    "fa-eye"
                );
            }
        }


        function showSuccessAndRedirect(
            message,
            userName,
            redirectUrl
        ) {

            const overlay =
                document.createElement('div');

            overlay.className = 'success-overlay';

            overlay.innerHTML = `

                <div class="success-card">

                    <i class="fas fa-check-circle"></i>

                    <h2>${message}</h2>

                    <p>
                        Welcome ${userName}
                    </p>

                </div>

            `;

            document.body.appendChild(overlay);

            setTimeout(() => {

                window.location.href =
                    redirectUrl;

            }, 2000);
        }


        /* ================= LOGIN ================= */

        document.getElementById('loginForm')

            .addEventListener('submit',

                async (e) => {

                    e.preventDefault();

                    const email =
                        document.getElementById('loginEmail').value.trim();

                    const password =
                        document.getElementById('loginPassword').value.trim();

                    if (!email || !password) {

                        showMessage(
                            "Fill all fields",
                            true
                        );

                        return;
                    }

                    try {

                        const response =
                            await fetch(`${API_URL}/login`, {

                                method: 'POST',

                                headers: {
                                    'Content-Type': 'application/json'
                                },

                                body: JSON.stringify({
                                    email,
                                    password
                                })
                            });

                        const data =
                            await response.json();

                        console.log(data);

                        if (response.ok && data.user) {

                            localStorage.setItem(
                                'user',
                                JSON.stringify(data.user)
                            );

                            localStorage.setItem(
                                'token',
                                data.token
                            );

                            showSuccessAndRedirect(
                                "✅ Login Successful",
                                data.user.name,
                                "home.html"
                            );

                        }

                        else {

                            showMessage(
                                data.msg || "Login Failed",
                                true
                            );
                        }

                    }

                    catch (error) {

                        console.log(error);

                        showMessage(
                            "Server Error",
                            true
                        );
                    }
                });


        /* ================= PARTICLES ================= */

        function createParticles() {

            const container =
                document.getElementById('particles');

            for (let i = 0; i < 40; i++) {

                const particle =
                    document.createElement('div');

                particle.classList.add('particle');

                const size =
                    Math.random() * 5 + 2;

                particle.style.width =
                    `${size}px`;

                particle.style.height =
                    `${size}px`;

                particle.style.left =
                    `${Math.random() * 100}%`;

                particle.style.animationDuration =
                    `${Math.random() * 10 + 5}s`;

                particle.style.animationDelay =
                    `${Math.random() * 5}s`;

                container.appendChild(particle);
            }
        }

        createParticles();

    </script>

</body>

</html>
