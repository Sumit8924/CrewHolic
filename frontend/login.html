<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CREWHOLIC — Login Portal | Fusion-Powered Digital Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            padding: 48px 44px;
            width: 100%;
            max-width: 500px;
        }

        .glass-card:hover {
            border-color: rgba(155, 81, 224, 0.5);
            box-shadow: 0 30px 60px -12px rgba(155, 81, 224, 0.3);
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #9B51E0, #F2994A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
            overflow: hidden;
        }

        .brand-logo {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(155, 81, 224, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(155, 81, 224, 0);
            }
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #9B51E0;
            box-shadow: 0 0 0 3px rgba(155, 81, 224, 0.2);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-grad {
            background: linear-gradient(95deg, #9B51E0 0%, #F2994A 100%);
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            width: 100%;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(155, 81, 224, 0.4);
            color: white;
        }

        .switch-link {
            color: #F2994A;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-link:hover {
            color: #9B51E0;
            text-decoration: underline;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #C5CBF0;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        .form-control-with-icon {
            padding-left: 45px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #9B51E0;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 19, 30, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 14px;
            border: 1px solid rgba(155, 81, 224, 0.7);
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155, 81, 224, 0.3);
            border-top-color: #9B51E0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .success-card {
            background: linear-gradient(135deg, rgba(155, 81, 224, 0.2), rgba(242, 153, 74, 0.2));
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: scaleIn 0.5s ease;
        }
        
        .success-card i {
            font-size: 80px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .success-card h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .success-card p {
            color: #B4BDE8;
            margin-bottom: 30px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .glass-card {
                margin: 20px;
                padding: 32px 24px !important;
            }
            .success-card {
                padding: 30px 20px;
                margin: 20px;
            }
        }
        
        .divider {
            border-color: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-link a {
            color: #F2994A;
            text-decoration: none;
            font-size: 13px;
        }

        .forgot-link a:hover {
            color: #9B51E0;
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <div class="text-center mb-4">
                        <div class="brand-icon">
                            <img id="brandLogo" class="brand-logo" src="skr.png" alt="CREWHOLIC Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%239B51E0\'/%3E%3Ctext x=\'50\' y=\'68\' text-anchor=\'middle\' font-size=\'28\' fill=\'white\'%3EC%3C/text%3E%3C/svg%3E'">
                        </div>
                        <h2 class="mb-2 mt-3" style="color: white; font-weight: 800;">CREWHOLIC</h2>
                        <p class="text-white-50">Fusion-Powered Digital Agency</p>
                    </div>

                    <form id="loginForm">
                        <div class="input-group">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-control form-control-with-icon" id="loginEmail" placeholder="Email address" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control form-control-with-icon" id="loginPassword" placeholder="Password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                        </div>
                        
                        <div class="forgot-link">
                            <a href="forgotpassword.html">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn-grad">Sign In <i class="fas fa-arrow-right ms-2"></i></button>
                    </form>
                    
                    <hr class="divider">
                    
                    <div class="text-center mt-2">
                        <p class="text-white-50 mb-0">Don't have an account? <a href="signup.html" class="switch-link">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = "https://crewholic-2.onrender.com/api";

function showSuccessAndRedirect(message, userName, redirectUrl) {
    const overlay = document.createElement('div');
    overlay.className = 'success-overlay';
    overlay.innerHTML = `
        <div class="success-card">
            <i class="fas fa-check-circle"></i>
            <h2>${message}</h2>
            <p>Welcome back, ${userName}! Redirecting you to CREWHOLIC...</p>
            <div class="spinner" style="width: 40px; height: 40px; border: 3px solid rgba(155,81,224,0.3); border-top-color: #9B51E0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;"></div>
        </div>
    `;
    
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        window.location.href = redirectUrl;
    }, 2000);
}

function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    
    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        field.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

function showMessage(message, isError = false) {
    const existingToast = document.querySelector('.toast-message');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.textContent = message;
    
    if (isError) {
        toast.style.background = '#8B2C2C';
        toast.style.borderColor = '#FF6B6B';
    } else {
        toast.style.background = 'rgba(17, 19, 30, 0.95)';
    }
    
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Handle Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    
    if (!email || !password) {
        showMessage('Please fill in all fields', true);
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.user) {
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('token', data.token);
            sessionStorage.setItem('user', JSON.stringify(data.user));

let redirectPage = "index.html";

if (data.user.role === "super_admin") redirectPage = "admin-dashboard.html";
else if (data.user.role === "rental_admin") redirectPage = "rental-dashboard.html";
else if (data.user.role === "finance_admin") redirectPage = "finance-dashboard.html";
else if (data.user.role === "webdev_admin") redirectPage = "webdev-dashboard.html";
else if (data.user.role === "marketing_admin") redirectPage = "marketing-dashboard.html";
else if (data.user.role === "event_admin") redirectPage = "event-dashboard.html";
            const message = data.user.role === "admin" ? "Welcome Admin!" : "Login Successful!";

            showSuccessAndRedirect(message, data.user.name, redirectPage);
        } else {
            showMessage(data.msg || 'Login failed. Please check your credentials.', true);
        }
    } catch (error) {
        console.error("Login error:", error);
        showMessage('Server error. Please try again later.', true);
    }
});

// Create animated particles background
function createParticles() {
    const particlesContainer = document.getElementById('particles');
    const particleCount = 50;
    
    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 5 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${Math.random() * 10 + 5}s`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        
        particlesContainer.appendChild(particle);
    }
}

// Enter key submission
document.getElementById('loginEmail').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
});

document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
});

// Initialize
window.addEventListener('load', () => {
    createParticles();
});
</script>
</body>
</html>
