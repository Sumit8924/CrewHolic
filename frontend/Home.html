<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crewholic</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'Montserrat',sans-serif;
}

.scene {
  position:relative;
  width:700px; height:560px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}

/* ─── PHASE 1: Three ribbon straps ─── */
.ribbons {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-58%);
  width:320px; height:220px;
}

.ribbon {
  position:absolute;
  border-radius:60px;
  opacity:0;
}

.rb1 {
  width:240px; height:34px;
  background:linear-gradient(90deg,#ff5ca8,#cc40ff,#7733ff);
  top:18px; left:0;
  transform:translateX(-340px) rotate(-7deg);
  animation: rb1slide 0.55s cubic-bezier(.2,.8,.4,1) 0.1s forwards,
             rbExit 0.30s ease-in 1.4s forwards;
  box-shadow:0 6px 24px rgba(180,60,255,0.5);
}
@keyframes rb1slide { to { opacity:1; transform:translateX(0) rotate(-7deg); } }

.rb2 {
  width:260px; height:36px;
  background:linear-gradient(90deg,#ff6000,#ffbb00,#ffe000);
  top:88px; left:-10px;
  transform:translateX(400px) rotate(-4deg);
  animation: rb2slide 0.55s cubic-bezier(.2,.8,.4,1) 0.28s forwards,
             rbExit 0.30s ease-in 1.4s forwards;
  box-shadow:0 6px 24px rgba(255,150,0,0.5);
}
@keyframes rb2slide { to { opacity:1; transform:translateX(0) rotate(-4deg); } }

.rb3 {
  width:230px; height:30px;
  background:linear-gradient(90deg,#ff2244,#ff5500,#ff9900);
  top:160px; left:20px;
  transform:translateX(-340px) rotate(-5deg);
  animation: rb3slide 0.55s cubic-bezier(.2,.8,.4,1) 0.46s forwards,
             rbExit 0.30s ease-in 1.4s forwards;
  box-shadow:0 6px 24px rgba(255,60,0,0.4);
}
@keyframes rb3slide { to { opacity:1; transform:translateX(0) rotate(-5deg); } }

@keyframes rbExit { to { opacity:0; transform:scaleX(0.15) rotate(0deg); } }

/* ─── PHASE 2: Four 3D fragment blocks ─── */
.fragments {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-58%);
  width:200px; height:180px;
  opacity:0;
  animation: fragsIn 0.01s 1.4s forwards, fragsOut 0.35s ease-in 2.1s forwards;
}
@keyframes fragsIn  { to { opacity:1; } }
@keyframes fragsOut { to { opacity:0; transform:translate(-50%,-58%) scale(0.3); } }

.frag {
  position:absolute;
  border-radius:6px;
  opacity:0;
}

.f1 {
  width:38px; height:55px;
  background:linear-gradient(160deg,#ee44cc,#9922bb);
  left:35px; top:10px;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5), inset -3px -3px 8px rgba(0,0,0,0.3);
  border-radius:8px 8px 4px 4px;
  animation: fragBounce 0.4s ease 1.42s forwards;
}
.f2 {
  width:42px; height:52px;
  background:linear-gradient(160deg,#ff9900,#ff5500);
  left:110px; top:8px;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5), inset -3px -3px 8px rgba(0,0,0,0.3);
  border-radius:8px 8px 4px 4px;
  animation: fragBounce 0.4s ease 1.5s forwards;
}
.f3 {
  width:38px; height:50px;
  background:linear-gradient(160deg,#ff5500,#cc2200);
  left:38px; top:95px;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5), inset -3px -3px 8px rgba(0,0,0,0.3);
  border-radius:4px 4px 8px 8px;
  animation: fragBounce 0.4s ease 1.48s forwards;
}
.f4 {
  width:42px; height:48px;
  background:linear-gradient(160deg,#ffaa00,#ff6600);
  left:112px; top:98px;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5), inset -3px -3px 8px rgba(0,0,0,0.3);
  border-radius:4px 4px 8px 8px;
  animation: fragBounce 0.4s ease 1.56s forwards;
}

@keyframes fragBounce {
  0%   { opacity:0; transform:translateY(-20px) scale(0.7); }
  60%  { opacity:1; transform:translateY(6px) scale(1.05); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

/* ─── PHASE 3: CH Logo ─── */
.logo-wrap {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-58%);
  opacity:0;
  animation: logoIn 0.7s cubic-bezier(.2,.8,.3,1.2) 2.2s forwards;
}
@keyframes logoIn {
  0%   { opacity:0; transform:translate(-50%,-58%) scale(0.55); filter:brightness(2) saturate(0.3); }
  60%  { opacity:1; transform:translate(-50%,-58%) scale(1.04); filter:brightness(1.3) saturate(0.8); }
  100% { opacity:1; transform:translate(-50%,-58%) scale(1);    filter:brightness(1) saturate(1); }
}

.logo-img {
  width:300px; height:300px;
  object-fit:contain;
  filter:
    drop-shadow(0 8px 40px rgba(255,80,180,0.4))
    drop-shadow(0 0 60px rgba(255,160,0,0.25));
}

/* ─── PHASE 4: Brand name glitch reveal ─── */
.brand {
  position:absolute;
  bottom:60px; left:50%;
  transform:translateX(-50%);
  text-align:center;
  opacity:0;
  animation: brandIn 0.1s ease 3.0s forwards;
}
@keyframes brandIn { to { opacity:1; } }

.brand-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:56px;
  letter-spacing:11px;
  color:#f0ece0;
  position:relative;
  overflow:hidden;
}

.brand-name::before {
  content:'CREWHOLIC';
  position:absolute;
  left:0; top:0; width:100%; height:100%;
  color:#f0ece0;
  clip-path:inset(0 100% 0 0);
  animation: textWipe 0.6s steps(12,end) 3.05s forwards;
}
.brand-name .ghost { opacity:0; }
@keyframes textWipe {
  0%   { clip-path:inset(0 100% 0 0); }
  100% { clip-path:inset(0 0% 0 0); }
}

.brand-name::after {
  content:'CREWHOLIC';
  position:absolute;
  left:3px; top:0; width:100%; height:100%;
  color:#ff5ca8;
  clip-path:inset(0 100% 0 0);
  opacity:0.5;
  animation: glitchBar 0.6s steps(12,end) 3.05s forwards,
             glitchFade 0.3s ease 3.65s forwards;
}
@keyframes glitchBar {
  0%   { clip-path:inset(0 100% 0 0); }
  100% { clip-path:inset(0 0% 0 0); }
}
@keyframes glitchFade { to { opacity:0; left:0; } }

.brand-tagline {
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  letter-spacing:4px;
  color:#777;
  text-transform:uppercase;
  margin-top:10px;
  opacity:0;
  animation: fadeUp 0.6s ease 3.75s forwards;
}
.brand-tagline span { color:#ff6a00; margin:0 5px; }

@keyframes fadeUp {
  0%   { opacity:0; transform:translateY(10px); }
  100% { opacity:1; transform:translateY(0); }
}

.replay {
  position:fixed; bottom:26px; right:26px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:#555; font-family:'Montserrat',sans-serif;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  padding:9px 18px; border-radius:40px; cursor:pointer;
  opacity:0; animation: fadeUp 0.4s ease 4.4s forwards;
  transition:all 0.2s;
}
.replay:hover { border-color:#ff6a00; color:#ff6a00; }
</style>
</head>
