<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CREWHOLIC — Dashboard | Real-Time Order Management</title>
    <!-- Bootstrap 5 CSS + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2a 50%, #050510 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glass morphism */
        .glass-card {
            background: rgba(15, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(155, 81, 224, 0.5);
            box-shadow: 0 10px 30px -12px rgba(155, 81, 224, 0.3);
        }

        .navbar-glass {
            background: rgba(15, 18, 40, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-grad {
            background: linear-gradient(95deg, #9B51E0 0%, #F2994A 100%);
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(155, 81, 224, 0.4);
            color: white;
        }

        .btn-outline-grad {
            background: transparent;
            border: 1px solid #9B51E0;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-outline-grad:hover {
            background: linear-gradient(95deg, #9B51E0, #F2994A);
            border-color: transparent;
            color: white;
        }

        .stat-card {
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF, #9B51E0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .table-custom {
            color: white;
        }

        .table-custom thead th {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #9B51E0;
            font-weight: 600;
        }

        .table-custom tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .table-custom tbody tr:hover {
            background: rgba(155, 81, 224, 0.1);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(242, 153, 74, 0.2);
            color: #F2994A;
        }

        .status-processing {
            background: rgba(155, 81, 224, 0.2);
            color: #9B51E0;
        }

        .status-completed {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .status-shipped {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
        }

        .modal-glass {
            background: rgba(15, 18, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-control-custom {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
        }

        .form-control-custom:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #9B51E0;
            box-shadow: 0 0 0 3px rgba(155, 81, 224, 0.2);
            color: white;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(17, 19, 30, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            border-left: 4px solid #4CAF50;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .filter-bar {
            background: rgba(15, 18, 40, 0.5);
            border-radius: 16px;
            padding: 15px;
        }

        .action-btn {
            padding: 4px 10px;
            margin: 0 3px;
            font-size: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-glass fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-white d-flex align-items-center gap-2" href="#">
            <img id="navLogo" class="brand-logo" src="skr.png" alt="Logo">
            <span class="fw-bold">CREWHOLIC Dashboard</span>
        </a>
        <div class="d-flex gap-2">
            <span class="text-white-50 me-2" id="userNameDisplay"></span>
            <button class="btn-outline-grad btn-sm" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container-fluid px-4" style="margin-top: 80px;">
    <!-- Stats Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="glass-card stat-card">
                <i class="fas fa-shopping-cart fa-2x mb-2" style="color: #9B51E0"></i>
                <div class="stat-number" id="totalOrders">0</div>
                <p class="text-white-50 mb-0">Total Orders</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card stat-card">
                <i class="fas fa-dollar-sign fa-2x mb-2" style="color: #F2994A"></i>
                <div class="stat-number" id="totalRevenue">$0</div>
                <p class="text-white-50 mb-0">Total Revenue</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card stat-card">
                <i class="fas fa-users fa-2x mb-2" style="color: #4CAF50"></i>
                <div class="stat-number" id="totalCustomers">0</div>
                <p class="text-white-50 mb-0">Unique Customers</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card stat-card">
                <i class="fas fa-chart-line fa-2x mb-2" style="color: #2196F3"></i>
                <div class="stat-number" id="avgOrderValue">$0</div>
                <p class="text-white-50 mb-0">Avg Order Value</p>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="glass-card p-3">
                <h5 class="mb-3"><i class="fas fa-chart-bar me-2"></i> Orders by Status</h5>
                <canvas id="statusChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="glass-card p-3">
                <h5 class="mb-3"><i class="fas fa-chart-line me-2"></i> Orders Trend (Last 7 Days)</h5>
                <canvas id="trendChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="glass-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h4 class="mb-0"><i class="fas fa-list me-2"></i> All Orders</h4>
            <div class="d-flex gap-2 flex-wrap">
                <input type="text" id="searchInput" class="form-control form-control-custom" placeholder="Search by customer..." style="width: 200px;">
                <select id="statusFilter" class="form-control form-control-custom" style="width: 150px;">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="completed">Completed</option>
                </select>
                <button class="btn-grad" onclick="openAddOrderModal()">
                    <i class="fas fa-plus"></i> New Order
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Email</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="8" class="text-center text-white-50">Loading orders...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Order Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-glass text-white">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="modalTitle">Add New Order</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="orderForm">
                    <input type="hidden" id="orderId">
                    <div class="mb-3">
                        <label class="form-label">Customer Name *</label>
                        <input type="text" id="customerName" class="form-control form-control-custom" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" id="customerEmail" class="form-control form-control-custom" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Product/Service *</label>
                        <input type="text" id="product" class="form-control form-control-custom" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount ($) *</label>
                        <input type="number" id="amount" class="form-control form-control-custom" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status *</label>
                        <select id="status" class="form-control form-control-custom" required>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-grad" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-grad" onclick="saveOrder()">Save Order</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Order Management System - All data stored in localStorage (Real data, no fakes)

let orders = [];
let statusChart = null;
let trendChart = null;

// Load orders from localStorage
function loadOrders() {
    const savedOrders = localStorage.getItem('crewholic_orders');
    if (savedOrders) {
        orders = JSON.parse(savedOrders);
    } else {
        // Start with empty array - NO FAKE DATA
        orders = [];
        saveOrders();
    }
    updateDashboard();
}

// Save orders to localStorage
function saveOrders() {
    localStorage.setItem('crewholic_orders', JSON.stringify(orders));
}

// Update all dashboard components
function updateDashboard() {
    updateStats();
    updateOrdersTable();
    updateCharts();
}

// Update statistics
function updateStats() {
    const totalOrders = orders.length;
    const totalRevenue = orders.reduce((sum, order) => sum + order.amount, 0);
    const uniqueCustomers = new Set(orders.map(o => o.email)).size;
    const avgOrderValue = totalOrders > 0 ? totalRevenue / totalOrders : 0;
    
    document.getElementById('totalOrders').textContent = totalOrders;
    document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
    document.getElementById('totalCustomers').textContent = uniqueCustomers;
    document.getElementById('avgOrderValue').textContent = `$${avgOrderValue.toFixed(2)}`;
}

// Update orders table with filters
function updateOrdersTable() {
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    const statusFilter = document.getElementById('statusFilter')?.value || 'all';
    
    let filteredOrders = orders.filter(order => {
        const matchesSearch = order.customerName.toLowerCase().includes(searchTerm) || 
                             order.product.toLowerCase().includes(searchTerm);
        const matchesStatus = statusFilter === 'all' || order.status === statusFilter;
        return matchesSearch && matchesStatus;
    });
    
    // Sort by date (newest first)
    filteredOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    const tbody = document.getElementById('ordersTableBody');
    
    if (filteredOrders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-white-50">No orders found</td></tr>';
        return;
    }
    
    tbody.innerHTML = filteredOrders.map(order => `
        <tr>
            <td>#${order.id}</td>
            <td>${escapeHtml(order.customerName)}</td>
            <td>${escapeHtml(order.email)}</td>
            <td>${escapeHtml(order.product)}</td>
            <td>$${order.amount.toFixed(2)}</td>
            <td>${formatDate(order.date)}</td>
            <td><span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span></td>
            <td>
                <button class="btn-grad action-btn" onclick="editOrder('${order.id}')">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn-outline-grad action-btn" onclick="deleteOrder('${order.id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

// Update charts
function updateCharts() {
    // Status distribution
    const statusCounts = {
        pending: orders.filter(o => o.status === 'pending').length,
        processing: orders.filter(o => o.status === 'processing').length,
        shipped: orders.filter(o => o.status === 'shipped').length,
        completed: orders.filter(o => o.status === 'completed').length
    };
    
    // Last 7 days orders
    const last7Days = [];
    for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const count = orders.filter(o => o.date.startsWith(dateStr)).length;
        last7Days.push(count);
    }
    
    const dayLabels = [];
    for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        dayLabels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
    }
    
    // Update status chart
    if (statusChart) statusChart.destroy();
    const ctx1 = document.getElementById('statusChart').getContext('2d');
    statusChart = new Chart(ctx1, {
        type: 'doughnut',
        data: {
            labels: ['Pending', 'Processing', 'Shipped', 'Completed'],
            datasets: [{
                data: [statusCounts.pending, statusCounts.processing, statusCounts.shipped, statusCounts.completed],
                backgroundColor: ['#F2994A', '#9B51E0', '#2196F3', '#4CAF50'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: 'white' } }
            }
        }
    });
    
    // Update trend chart
    if (trendChart) trendChart.destroy();
    const ctx2 = document.getElementById('trendChart').getContext('2d');
    trendChart = new Chart(ctx2, {
        type: 'line',
        data: {
            labels: dayLabels,
            datasets: [{
                label: 'Orders',
                data: last7Days,
                borderColor: '#9B51E0',
                backgroundColor: 'rgba(155, 81, 224, 0.1)',
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: 'white' } }
            },
            scales: {
                y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }
            }
        }
    });
}

// Add new order
function addOrder(orderData) {
    const newOrder = {
        id: Date.now().toString(),
        ...orderData,
        date: new Date().toISOString(),
        amount: parseFloat(orderData.amount)
    };
    orders.push(newOrder);
    saveOrders();
    updateDashboard();
    showMessage('Order added successfully!', 'success');
}

// Update existing order
function updateOrder(id, orderData) {
    const index = orders.findIndex(o => o.id === id);
    if (index !== -1) {
        orders[index] = {
            ...orders[index],
            ...orderData,
            amount: parseFloat(orderData.amount)
        };
        saveOrders();
        updateDashboard();
        showMessage('Order updated successfully!', 'success');
    }
}

// Delete order
function deleteOrder(id) {
    if (confirm('Are you sure you want to delete this order?')) {
        orders = orders.filter(o => o.id !== id);
        saveOrders();
        updateDashboard();
        showMessage('Order deleted successfully!', 'success');
    }
}

// Edit order
function editOrder(id) {
    const order = orders.find(o => o.id === id);
    if (order) {
        document.getElementById('modalTitle').textContent = 'Edit Order';
        document.getElementById('orderId').value = order.id;
        document.getElementById('customerName').value = order.customerName;
        document.getElementById('customerEmail').value = order.email;
        document.getElementById('product').value = order.product;
        document.getElementById('amount').value = order.amount;
        document.getElementById('status').value = order.status;
        
        new bootstrap.Modal(document.getElementById('orderModal')).show();
    }
}

// Open add order modal
function openAddOrderModal() {
    document.getElementById('modalTitle').textContent = 'Add New Order';
    document.getElementById('orderForm').reset();
    document.getElementById('orderId').value = '';
    new bootstrap.Modal(document.getElementById('orderModal')).show();
}

// Save order (create or update)
function saveOrder() {
    const id = document.getElementById('orderId').value;
    const orderData = {
        customerName: document.getElementById('customerName').value.trim(),
        email: document.getElementById('customerEmail').value.trim(),
        product: document.getElementById('product').value.trim(),
        amount: document.getElementById('amount').value,
        status: document.getElementById('status').value
    };
    
    // Validation
    if (!orderData.customerName || !orderData.email || !orderData.product || !orderData.amount) {
        showMessage('Please fill in all fields', 'error');
        return;
    }
    
    if (orderData.amount <= 0) {
        showMessage('Amount must be greater than 0', 'error');
        return;
    }
    
    if (id) {
        updateOrder(id, orderData);
    } else {
        addOrder(orderData);
    }
    
    bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
}

// Helper functions
function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showMessage(message, type = 'success') {
    const existingToast = document.querySelector('.toast-message');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.textContent = message;
    
    if (type === 'error') {
        toast.style.borderLeftColor = '#f44336';
    }
    
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Search and filter event listeners
document.getElementById('searchInput')?.addEventListener('input', () => updateOrdersTable());
document.getElementById('statusFilter')?.addEventListener('change', () => updateOrdersTable());

// Logout function
function logout() {
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

// Load user data
function loadUser() {
    const user = localStorage.getItem('user');
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    const userData = JSON.parse(user);
    document.getElementById('userNameDisplay').textContent = `Welcome, ${userData.name || 'User'}`;
}

// Load saved logo
function loadLogo() {
    const savedLogo = localStorage.getItem('customLogo');
    if (savedLogo) {
        document.getElementById('navLogo').src = savedLogo;
    }
}

// Initialize dashboard
window.addEventListener('load', () => {
    loadUser();
    loadLogo();
    loadOrders();
    
    // Set up real-time refresh every 5 seconds (optional)
    // setInterval(() => updateDashboard(), 5000);
});
</script>
</body>
</html>
